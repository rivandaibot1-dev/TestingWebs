<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uji Coba Leaderboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 500px;
      background: #141414;
      border: 2px solid gold;
      border-radius: 15px;
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.4);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(90deg, #d4af37, #ffd700);
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: #111;
    }

    .desc-box {
      padding: 15px;
      text-align: center;
      font-size: 14px;
      color: #ffd700;
      background: rgba(255, 215, 0, 0.05);
      border-bottom: 1px solid rgba(255, 215, 0, 0.2);
    }

    .input-box {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 15px;
      background: #111;
      border-bottom: 1px solid rgba(255, 215, 0, 0.2);
    }

    .input-box input {
      padding: 10px;
      border: 1px solid gold;
      background: #1c1c1c;
      color: white;
      border-radius: 8px;
      outline: none;
    }

    .input-box button {
      padding: 10px;
      background: gold;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .item {
      display: flex;
      flex-direction: column;
      padding: 15px;
      border-bottom: 1px solid rgba(255, 215, 0, 0.2);
      transition: 0.3s;
    }

    .item:hover {
      background: rgba(255, 215, 0, 0.1);
      transform: scale(1.02);
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .rank {
      font-weight: bold;
      color: gold;
    }

    .name {
      flex: 1;
      margin-left: 10px;
      font-weight: bold;
    }

    .desc {
      font-size: 12px;
      color: #ccc;
      margin-top: 5px;
      margin-left: 25px;
    }

    .time {
      font-size: 12px;
      color: #ffd700;
    }

    .top1 .name { color: #ffd700; }
    .top2 .name { color: #c0c0c0; }
    .top3 .name { color: #cd7f32; }
  </style>
</head>

<body>

<div class="container">

  <div class="header">Absen dulu gess 🗿</div>

  <div class="desc-box">
    Hai ini website uji coba leaderboard 😄 isi nama dan deskripsi kamu
  </div>

  <div class="input-box">
    <input type="text" id="nameInput" placeholder="Masukkan nama kamu..." />
    <input type="text" id="descInput" placeholder="Tulis deskripsi kamu..." />
    <button onclick="addUser()">Masuk</button>
  </div>

  <ul class="list" id="leaderboard"></ul>

</div>

<script>
  let data = JSON.parse(localStorage.getItem("leaderboard")) || [];

  function saveData() {
    localStorage.setItem("leaderboard", JSON.stringify(data));
  }

  function render() {
    const list = document.getElementById("leaderboard");
    list.innerHTML = "";

    data.sort((a, b) => a.time - b.time);

    data.forEach((user, index) => {
      let rankClass = "";
      if (index === 0) rankClass = "top1";
      else if (index === 1) rankClass = "top2";
      else if (index === 2) rankClass = "top3";

      const li = document.createElement("li");
      li.className = "item " + rankClass;

      li.innerHTML = `
        <div class="top-row">
          <div class="rank">#${index + 1}</div>
          <div class="name">${user.name}</div>
          <div class="time">${new Date(user.time).toLocaleTimeString()}</div>
        </div>
        <div class="desc">${user.desc || "No description"}</div>
      `;

      list.appendChild(li);
    });
  }

  function addUser() {
    const name = document.getElementById("nameInput").value.trim();
    const desc = document.getElementById("descInput").value.trim();

    if (!name) return;

    data.push({
      name,
      desc,
      time: Date.now()
    });

    saveData();
    render();

    document.getElementById("nameInput").value = "";
    document.getElementById("descInput").value = "";
  }

  render();

  // RESET 1 JAM
  const RESET_TIME = 60 * 60 * 10;

  function checkReset() {
    const lastReset = localStorage.getItem("lastReset") || 0;
    const now = Date.now();

    if (now - lastReset > RESET_TIME) {
      localStorage.removeItem("leaderboard");
      localStorage.setItem("lastReset", now);
      data = [];
      render();
    }
  }

  checkReset();
  setInterval(checkReset, 5000);
</script>

</body>
</html>
